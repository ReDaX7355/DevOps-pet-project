version: "3.8"

services:
  postgres-db:
    container_name: postgres-db
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app_backend:
    container_name: app_backend
    build: ./backend
    restart: unless-stopped
    ports:
      - "${PORT:-4450}:4450"
    environment:
      NODE_ENV: "development"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: "postgresql://postgres:postgres@postgres-db:5432/todo_db"
      PORT: ${PORT:-4450}
    depends_on:
      - postgres-db
    networks:
      - app-network
    develop:
      watch:
        # ✅ ПРАВИЛЬНЫЙ порядок: path → action → target
        - path: ./backend/src          # Синхронизация src
          action: sync
          target: /app/src
          ignore:
            - "**/*.test.js"
            - "**/__tests__/**"
        - path: ./backend/package.json  # Rebuild deps
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend/tsconfig.json
          action: rebuild

  frontend:
    container_name: frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8580:80"
    depends_on:
      - app_backend
    networks:
      - app-network
    develop:
      watch:
        - path: ./frontend
          action: rebuild

volumes:
  postgres_data:

networks:
  app-network:
